name: Bug report
description: Report a reproducible integration problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include tokens, private URLs, precise addresses, or unredacted diagnostics.
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: 1.3.0
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: 2026.7.2
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS custom repository
        - Manual copy
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or diagnostics
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I am using the latest released integration version.
          required: true
        - label: I removed location URLs, addresses, tokens, and other personal data.
          required: true
